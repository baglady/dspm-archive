<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="dspm 2 performance hero card: 21 minutes 3 seconds, 5 performers, 3399 gestures">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#c7ecff"/>
      <stop offset="0.42" stop-color="#d8f3ef"/>
      <stop offset="0.72" stop-color="#e6f7cf"/>
      <stop offset="1" stop-color="#cdeeb0"/>
    </linearGradient>
    <radialGradient id="topglow" cx="0.5" cy="-0.1" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="0.48" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.46"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="limebead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3ffd6"/>
      <stop offset="0.5" stop-color="#d6f29a"/>
      <stop offset="0.51" stop-color="#b6e36a"/>
      <stop offset="1" stop-color="#9fd64f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#145070" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#sky)"/>
  <rect width="1080" height="1080" fill="url(#topglow)"/>

  <g font-family="Segoe UI, -apple-system, Helvetica Neue, Arial, sans-serif">
    <rect x="90" y="120" width="900" height="840" rx="44" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2" filter="url(#soft)"/>
    <rect x="104" y="134" width="872" height="150" rx="34" fill="url(#gloss)" opacity="0.55"/>

    <rect x="150" y="186" width="190" height="48" rx="24" fill="url(#limebead)" stroke="#ffffff" stroke-opacity="0.9"/>
    <text x="245" y="218" text-anchor="middle" font-size="24" font-weight="600" fill="#133b46" letter-spacing="3">ARCHIVE</text>
    <text x="930" y="220" text-anchor="end" font-size="26" fill="#5a7884" letter-spacing="1">2026 · 06 · 20</text>

    <text x="540" y="430" text-anchor="middle" font-size="200" font-weight="700" fill="#133b46" letter-spacing="-4">dspm·2</text>
    <text x="540" y="500" text-anchor="middle" font-size="34" fill="#1f8a4c" letter-spacing="6" font-weight="600">LIVE LOOPER PERFORMANCE</text>

    <line x1="180" y1="560" x2="900" y2="560" stroke="#3a9d4e" stroke-opacity="0.35" stroke-width="2"/>

    <g text-anchor="middle">
      <text x="270" y="720" font-size="110" font-weight="700" fill="#133b46">21:03</text>
      <text x="270" y="772" font-size="28" fill="#5a7884" letter-spacing="2">duration</text>

      <text x="540" y="720" font-size="110" font-weight="700" fill="#133b46">5</text>
      <text x="540" y="772" font-size="28" fill="#5a7884" letter-spacing="2">performers</text>

      <text x="810" y="720" font-size="110" font-weight="700" fill="#133b46">3,399</text>
      <text x="810" y="772" font-size="28" fill="#5a7884" letter-spacing="2">gestures</text>
    </g>

    <line x1="180" y1="828" x2="900" y2="828" stroke="#3a9d4e" stroke-opacity="0.35" stroke-width="2"/>
    <text x="540" y="900" text-anchor="middle" font-size="28" fill="#5a7884">16 phones connected · 6-voice barcode looper on norns · driven from the crowd</text>
  </g>
