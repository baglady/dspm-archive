<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Voice activity: v1 1801 gestures, v3 1126, v2 141, v4 to v6 silent">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#c7ecff"/>
      <stop offset="0.42" stop-color="#d8f3ef"/>
      <stop offset="0.72" stop-color="#e6f7cf"/>
      <stop offset="1" stop-color="#cdeeb0"/>
    </linearGradient>
    <radialGradient id="topglow" cx="0.5" cy="-0.1" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="0.48" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.46"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3ffd6"/>
      <stop offset="0.5" stop-color="#cdeb8e"/>
      <stop offset="0.51" stop-color="#9fd64f"/>
      <stop offset="1" stop-color="#6fc02f"/>
    </linearGradient>
    <linearGradient id="bardim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eafbff"/>
      <stop offset="0.51" stop-color="#bfe6ff"/>
      <stop offset="1" stop-color="#8fd0ea"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#145070" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#sky)"/>
  <rect width="1080" height="1080" fill="url(#topglow)"/>

  <g font-family="Segoe UI, -apple-system, Helvetica Neue, Arial, sans-serif">
    <text x="90" y="150" font-size="40" font-weight="600" fill="#1f8a4c" letter-spacing="4">dspm·2</text>
    <text x="90" y="232" font-size="76" font-weight="700" fill="#133b46">The sound</text>
    <text x="90" y="288" font-size="30" fill="#5a7884">Six looper voices. Two carried the whole set.</text>

    <rect x="90" y="330" width="900" height="630" rx="44" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2" filter="url(#soft)"/>
    <rect x="104" y="344" width="872" height="120" rx="34" fill="url(#gloss)" opacity="0.5"/>

    <g>
      <text x="150" y="430" font-size="40" font-weight="700" fill="#133b46">v1</text>
      <rect x="230" y="398" width="660" height="46" rx="23" fill="#ffffff" fill-opacity="0.4" stroke="#ffffff" stroke-opacity="0.7"/>
      <rect x="230" y="398" width="640" height="46" rx="23" fill="url(#bar)" stroke="#ffffff" stroke-opacity="0.85"/>
      <text x="900" y="430" text-anchor="end" font-size="34" font-weight="700" fill="#133b46">1801</text>

      <text x="150" y="560" font-size="40" font-weight="700" fill="#133b46">v3</text>
      <rect x="230" y="528" width="660" height="46" rx="23" fill="#ffffff" fill-opacity="0.4" stroke="#ffffff" stroke-opacity="0.7"/>
      <rect x="230" y="528" width="400" height="46" rx="23" fill="url(#bar)" stroke="#ffffff" stroke-opacity="0.85"/>
      <text x="900" y="560" text-anchor="end" font-size="34" font-weight="700" fill="#133b46">1126</text>

      <text x="150" y="690" font-size="40" font-weight="700" fill="#133b46">v2</text>
      <rect x="230" y="658" width="660" height="46" rx="23" fill="#ffffff" fill-opacity="0.4" stroke="#ffffff" stroke-opacity="0.7"/>
      <rect x="230" y="658" width="60" height="46" rx="23" fill="url(#bardim)" stroke="#ffffff" stroke-opacity="0.85"/>
      <text x="900" y="690" text-anchor="end" font-size="34" font-weight="700" fill="#133b46">141</text>

      <text x="150" y="820" font-size="40" font-weight="700" fill="#9bb4bf">v4–v6</text>
      <rect x="230" y="788" width="660" height="46" rx="23" fill="#ffffff" fill-opacity="0.3" stroke="#ffffff" stroke-opacity="0.6"/>
      <text x="560" y="820" text-anchor="middle" font-size="28" fill="#7a98a4" letter-spacing="3">silent</text>
      <text x="900" y="820" text-anchor="end" font-size="34" font-weight="700" fill="#9bb4bf">0</text>
    </g>

    <line x1="150" y1="876" x2="930" y2="876" stroke="#3a9d4e" stroke-opacity="0.3" stroke-width="2"/>
    <text x="150" y="928" font-size="28" fill="#5a7884">v1 rode level + rate · v3 was pure LFO modulation texture</text>
  </g>
</svg>
