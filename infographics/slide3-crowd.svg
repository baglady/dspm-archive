    <text x="90" y="232" font-size="76" font-weight="700" fill="#133b46">The crowd</text>
    <text x="90" y="288" font-size="30" fill="#5a7884">Five phones in the take — but one set led the dance.</text>

    <circle cx="320" cy="600" r="200" fill="url(#hero)" stroke="#ffffff" stroke-width="6" filter="url(#soft)"/>
    <ellipse cx="320" cy="520" rx="150" ry="70" fill="url(#gloss)" opacity="0.5"/>
    <text x="320" y="585" text-anchor="middle" font-size="150" font-weight="700" fill="#1c5a2a">61%</text>
    <text x="320" y="660" text-anchor="middle" font-size="30" fill="#1f5a2c" letter-spacing="1">2,080 gestures</text>
    <text x="320" y="855" text-anchor="middle" font-size="30" fill="#5a7884">lead performer</text>
    <text x="320" y="895" text-anchor="middle" font-size="26" fill="#9bb4bf" font-family="monospace">2a3ezgbwj64</text>

